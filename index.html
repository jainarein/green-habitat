<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Habitat — Environmental Certification</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#060d08;
color:#e8f5ec;
font-family:'DM Sans',sans-serif;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px 24px;
}

header{
text-align:center;
margin-bottom:40px;
}

h1{
font-family:'Syne',sans-serif;
font-size:42px;
margin:10px 0;
}

.logo{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
font-weight:800;
font-family:'Syne';
color:#00ff87;
}

.search-box{
display:flex;
gap:10px;
margin-top:30px;
}

.search-box input{
flex:1;
padding:14px;
border-radius:10px;
border:1px solid #1e3322;
background:#111f13;
color:white;
font-size:16px;
}

.search-btn{
background:#00c96a;
border:none;
padding:14px 24px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.error-box{
display:none;
background:#4d1b1b;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.loading{
display:none;
text-align:center;
margin-top:30px;
}

.results{
display:none;
margin-top:40px;
background:#111f13;
padding:30px;
border-radius:20px;
}

.score{
font-size:48px;
font-weight:800;
font-family:'Syne';
color:#00ff87;
}

.param{
margin-top:15px;
}

footer{
margin-top:60px;
text-align:center;
font-size:13px;
color:#6b9478;
}

</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">🌿 Green Habitat</div>
<h1>Environmental Livability Certification</h1>
<p>Powered by Sentinel-2 · WAQI · OpenStreetMap</p>
</header>

<div class="search-box">
<input id="locationInput" placeholder="Enter city, area or pincode">
<button class="search-btn" onclick="rateArea()">Analyse</button>
</div>

<div class="error-box" id="errorBox"></div>

<div class="loading" id="loading">
<p>Fetching satellite and environmental data...</p>
</div>

<div class="results" id="results">

<h2 id="locationName"></h2>

<div class="score" id="scoreNumber">0</div>

<div class="param">🌿 Greenery: <span id="greenery"></span></div>
<div class="param">💨 Air Quality: <span id="aqi"></span></div>
<div class="param">🚗 Traffic: <span id="traffic"></span></div>
<div class="param">👥 Crowd Density: <span id="crowd"></span></div>
<div class="param">🔇 Noise: <span id="noise"></span></div>

</div>

<footer>
Built with 💚 for AMD Slingshot Hackathon
</footer>

</div>

<script>

const API_BASE = "/api";

async function rateArea(){

const location=document.getElementById("locationInput").value.trim();
if(!location) return;

document.getElementById("loading").style.display="block";
document.getElementById("results").style.display="none";
document.getElementById("errorBox").style.display="none";

try{

const res=await fetch(`${API_BASE}/rate-area?location=${encodeURIComponent(location)}`);

const data=await res.json();

if(!res.ok){
throw new Error(data.detail || "Failed to fetch data");
}

document.getElementById("loading").style.display="none";
document.getElementById("results").style.display="block";

document.getElementById("locationName").innerText=data.location;

document.getElementById("scoreNumber").innerText=data.peace_score.toFixed(1);

document.getElementById("greenery").innerText=data.parameters.greenery_score;
document.getElementById("aqi").innerText=data.parameters.aqi_score;
document.getElementById("traffic").innerText=data.parameters.traffic_score;
document.getElementById("crowd").innerText=data.parameters.crowd_density_score;
document.getElementById("noise").innerText=data.parameters.noise_score;

}
catch(err){

document.getElementById("loading").style.display="none";

const box=document.getElementById("errorBox");
box.style.display="block";
box.innerText="⚠ "+err.message;

}

}

document.getElementById("locationInput").addEventListener("keydown",e=>{
if(e.key==="Enter") rateArea();
});

</script>

</body>
</html>
